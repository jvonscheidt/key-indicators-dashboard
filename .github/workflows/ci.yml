name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python version
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      # Install from requirements.txt so ruff and pytest match the pinned
      # versions developers run locally (formatter output can drift between
      # ruff releases).
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check formatting
        run: ruff format --check .

      - name: Lint
        run: ruff check .

      - name: Run tests
        run: pytest -q
