name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Pin ruff to the version in requirements.txt: formatter output can
      # change between releases, so CI must match what developers run locally.
      - name: Install ruff
        run: pip install ruff==0.15.16

      - name: Check formatting
        run: ruff format --check .
